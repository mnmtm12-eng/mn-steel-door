{% extends "base.html" %}
{% block body %}
<div class="auth-wrap"><form method="post" class="auth-card">
  <h1>تغيير كلمة السر</h1>
  <p class="sub">غيّر كلمة السر الافتراضية قبل المتابعة.</p>
  <input type="password" name="new" placeholder="كلمة سر جديدة (6 أحرف فأكثر)" required>
  <input type="password" name="confirm" placeholder="تأكيد كلمة السر" required>
  <button class="btn navy" style="width:100%" type="submit">حفظ ومتابعة</button>
</form></div>
{% endblock %}
